name: Manual sol artifacts
on: workflow_dispatch
jobs:
  deploy:
    uses: rainlanguage/rainix/.github/workflows/rainix-manual-sol-artifacts.yaml@main
    with:
      # rain.metadata's script/Deploy.sol doesn't dispatch on
      # DEPLOYMENT_SUITE (single deploy target). The input is required
      # by the upstream reusable; the value is unused at runtime.
      suite: default
    secrets: inherit
