specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: metaboard0
    network: matic
    source:
      abi: MetaBoard
      address: "0xfb8437AeFBB8031064E274527C5fc08e30Ac6928"
      startBlock: 82855948
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - MetaBoard
        - MetaV1
      abis:
        - name: MetaBoard
          file: ../out/MetaBoard.sol/MetaBoard.json
      eventHandlers:
        - event: MetaV1_2(address,bytes32,bytes)
          handler: handleMetaV1_2
      file: ./src/metaBoard.ts
